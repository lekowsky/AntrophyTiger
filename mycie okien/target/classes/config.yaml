# Konfiguracja pluginu WindowCleaning dla SkyRise

# Lokalizacje (wypełniane komendami)
boss-location: ""
elevator-location: ""
platform-location: ""

# Ustawienia zarobków i XP
base-earnings: 50.0
base-xp: 100
earnings-per-level: 0.1  # 10% więcej za każdy poziom

# Przedmioty pracy
brush:
  name: "&aSzczotka do okien"
  model-data: 1001
bucket:
  name: "&bWiaderko z płynem"
  model-data: 1002

# Poziomy (maksymalny poziom = 5)
