name: SkyRiseJobs
version: '${project.version}'
main: pl.skyrise.skyRiseJobs.SkyRiseJobs
api-version: '1.21'
description: Modular jobs plugin for SkyRise
authors: [SkyRise]
softdepend: [Vault, Citizens, PlaceholderAPI]

commands:
  skyrisejobs:
    description: Główna komenda administracyjna SkyRiseJobs
    usage: /skyrisejobs <reload|list|enable|disable|version>
    aliases: [srjobs, sjobsadmin]
    permission: skyrisejobs.admin
  jobs:
    description: Menu prac
    usage: /jobs [boost|praca]
    aliases: [prace, praca]
    permission: skyrisejobs.use
  jobboost:
    description: Globalny boost prac
    usage: /jobboost <status|buy>
    aliases: [boostpracy, jboost]
  joblevel:
    description: Poziom postaci
    usage: /joblevel [status|addexp|set]
    aliases: [poziom, poziompostaci, jlevel]
    permission: skyrisejobs.level.use
  windowcleaning:
    description: Praca Mycie Okien
    usage: /windowcleaning <reload|setboss|setelevatorup|setelevatordown|setplatform|wand|setregion>
    aliases: [mycieokien]
    permission: skyrisejobs.windowcleaning.admin

permissions:
  skyrisejobs.*:
    description: Pełny dostęp do SkyRiseJobs
    default: op
    children:
      skyrisejobs.admin: true
      skyrisejobs.use: true
      skyrisejobs.job.*: true
      skyrisejobs.boost.admin: true
      skyrisejobs.boost.elite: true
      skyrisejobs.level.admin: true
      skyrisejobs.level.use: true
      skyrisejobs.windowcleaning.admin: true
      skyrisejobs.job.windowcleaning: true
  skyrisejobs.admin:
    description: Zarządzanie modułami SkyRiseJobs
    default: op
  skyrisejobs.use:
    description: Dostęp do /jobs
    default: true
  skyrisejobs.job.*:
    description: Dostęp do wszystkich prac
    default: op
  skyrisejobs.boost.admin:
    description: Administracja globalnymi boostami prac
    default: op
  skyrisejobs.boost.elite:
    description: Możliwość kupowania globalnego boosta prac przez rangę premium/elita
    default: false
  skyrisejobs.level.use:
    description: Sprawdzanie własnego poziomu postaci
    default: true
  skyrisejobs.level.admin:
    description: Zarządzanie poziomami postaci
    default: op
  skyrisejobs.windowcleaning.admin:
    description: Administracja pracą Mycie Okien
    default: op
  skyrisejobs.job.windowcleaning:
    description: Dostęp do pracy Mycie Okien
    default: true
